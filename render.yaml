services:
  - type: web
    name: xhs-extractor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: FLASK_PORT
        value: 5000
      - key: LLM_PROVIDER
        value: grok
      - key: LLM_MODEL
        value: grok-3
      - key: LLM_API_KEY
        sync: false
      - key: XHS_COOKIE
        sync: false
